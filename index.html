<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片時間戳工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .drop-zone:hover {
            background: #f0f3ff;
            border-color: #764ba2;
        }

        .drop-zone.drag-over {
            background: #e8ecff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .drop-zone-text {
            font-size: 18px;
            color: #666;
            line-height: 1.5;
        }

        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .image-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .image-item {
            position: relative;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-item-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .image-item-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }

        .image-item:hover .image-item-remove {
            display: block;
        }

        .settings {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        .setting-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .setting-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            cursor: pointer;
        }

        input[type="datetime-local"],
        input[type="text"],
        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            max-width: 300px;
        }

        input[type="datetime-local"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .preview-canvas-container {
            display: none;
            margin-bottom: 30px;
            text-align: center;
        }

        .preview-canvas-container.show {
            display: block;
        }

        .preview-canvas-container h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .preview-canvas {
            max-width: 100%;
            max-height: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .processing-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mode-selector {
            text-align: center;
            margin-bottom: 20px;
        }

        .mode-selector button {
            margin: 0 5px;
        }

        .mode-selector .active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .image-list {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .setting-options {
                flex-direction: column;
            }

            input[type="datetime-local"],
            input[type="text"],
            select {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 照片時間戳工具</h1>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <div class="drop-zone-text">
                拖曳照片到此處<br>
                <small>或點擊選擇檔案</small>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="image-list" id="imageList"></div>

        <div class="mode-selector" id="modeSelector" style="display: none;">
            <p style="margin-bottom: 10px; color: #666;">多張照片 - 選擇處理模式：</p>
            <button class="btn-secondary active" data-mode="batch">統一套用設定</button>
            <button class="btn-secondary" data-mode="individual">逐張確認</button>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label>時間選擇</label>
                <div class="setting-options">
                    <div class="option">
                        <input type="radio" id="useCurrentTime" name="timeMode" value="current" checked>
                        <label for="useCurrentTime" style="margin: 0; font-weight: normal;">使用當前時間</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="useCustomTime" name="timeMode" value="custom">
                        <label for="useCustomTime" style="margin: 0; font-weight: normal;">自訂時間</label>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <input type="datetime-local" id="customTime">
                </div>
            </div>

            <div class="setting-group">
                <label>時間戳格式</label>
                <div class="setting-options">
                    <div class="option">
                        <input type="radio" id="formatA" name="format" value="A" checked>
                        <label for="formatA" style="margin: 0; font-weight: normal;">2026年4月24日 下午5:13:09</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="formatB" name="format" value="B">
                        <label for="formatB" style="margin: 0; font-weight: normal;">2026/04/24 17:13:09</label>
                    </div>
                </div>
            </div>

            <div class="setting-group">
                <label>時間戳位置</label>
                <div class="setting-options">
                    <div class="option">
                        <input type="radio" id="posTopRight" name="position" value="top-right" checked>
                        <label for="posTopRight" style="margin: 0; font-weight: normal;">右上</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="posTopLeft" name="position" value="top-left">
                        <label for="posTopLeft" style="margin: 0; font-weight: normal;">左上</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="posBottomRight" name="position" value="bottom-right">
                        <label for="posBottomRight" style="margin: 0; font-weight: normal;">右下</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="posBottomLeft" name="position" value="bottom-left">
                        <label for="posBottomLeft" style="margin: 0; font-weight: normal;">左下</label>
                    </div>
                </div>
            </div>

            <div class="setting-group">
                <label>字色</label>
                <div class="setting-options">
                    <div class="option">
                        <input type="radio" id="colorWhite" name="textColor" value="white" checked>
                        <label for="colorWhite" style="margin: 0; font-weight: normal;">白色</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="colorBlack" name="textColor" value="black">
                        <label for="colorBlack" style="margin: 0; font-weight: normal;">黑色</label>
                    </div>
                    <div class="option">
                        <input type="radio" id="colorYellow" name="textColor" value="yellow">
                        <label for="colorYellow" style="margin: 0; font-weight: normal;">黃色</label>
                    </div>
                </div>
            </div>

            <div class="setting-group">
                <label>現有時間戳處理</label>
                <div class="setting-options">
                    <div class="option">
                        <input type="checkbox" id="autoCropTimestamp" checked>
                        <label for="autoCropTimestamp" style="margin: 0; font-weight: normal;">自動裁切舊時間戳</label>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <label for="cropPixels" style="font-size: 12px; color: #666;">裁切像素數：</label>
                    <input type="number" id="cropPixels" value="50" min="0" max="500" style="width: 80px; padding: 4px; border: 1px solid #ddd; border-radius: 4px;">
                    <span style="font-size: 12px; color: #666; margin-left: 5px;">px（0 = 不裁切）</span>
                </div>
            </div>
        </div>

        <div class="preview-canvas-container" id="previewContainer">
            <h3>預覽</h3>
            <canvas id="previewCanvas" class="preview-canvas"></canvas>
        </div>

        <div class="status" id="status"></div>

        <div class="action-buttons">
            <button class="btn-secondary" id="clearBtn" style="display: none;">清除全部</button>
            <button class="btn-primary" id="previewBtn" style="display: none;">預覽</button>
            <button class="btn-primary" id="processBtn" style="display: none;">下載處理後的照片</button>
        </div>
    </div>

    <script>
        const app = {
            images: [],
            processingMode: 'batch',

            init() {
                this.setupEventListeners();
                this.updateCustomTimeInput();
            },

            setupEventListeners() {
                const dropZone = document.getElementById('dropZone');
                const fileInput = document.getElementById('fileInput');
                const useCurrentTime = document.getElementById('useCurrentTime');
                const useCustomTime = document.getElementById('useCustomTime');
                const customTime = document.getElementById('customTime');
                const clearBtn = document.getElementById('clearBtn');
                const previewBtn = document.getElementById('previewBtn');
                const processBtn = document.getElementById('processBtn');
                const modeSelector = document.getElementById('modeSelector');

                dropZone.addEventListener('click', () => fileInput.click());
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('drag-over');
                });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                    this.handleFiles(e.dataTransfer.files);
                });

                fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));

                useCurrentTime.addEventListener('change', () => this.updateCustomTimeInput());
                useCustomTime.addEventListener('change', () => this.updateCustomTimeInput());
                customTime.addEventListener('change', () => this.updatePreview());

                document.querySelectorAll('input[name="format"], input[name="position"], input[name="textColor"]').forEach(el => {
                    el.addEventListener('change', () => this.updatePreview());
                });

                clearBtn.addEventListener('click', () => this.clearImages());
                previewBtn.addEventListener('click', () => this.updatePreview());
                processBtn.addEventListener('click', () => this.processImages());

                modeSelector.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        modeSelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.processingMode = e.target.dataset.mode;
                    });
                });
            },

            updateCustomTimeInput() {
                const customTime = document.getElementById('customTime');
                const useCustom = document.getElementById('useCustomTime').checked;

                if (useCustom) {
                    const now = new Date();
                    const isoString = now.toISOString().slice(0, 16);
                    customTime.value = isoString;
                    customTime.style.display = 'block';
                } else {
                    customTime.style.display = 'none';
                }

                this.updatePreview();
            },

            handleFiles(files) {
                Array.from(files).forEach(file => {
                    if (!file.type.startsWith('image/')) return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.images.push({
                            name: file.name,
                            data: e.target.result,
                            originalFile: file,
                        });
                        this.updateUI();
                    };
                    reader.readAsDataURL(file);
                });
            },

            updateUI() {
                const imageList = document.getElementById('imageList');
                const clearBtn = document.getElementById('clearBtn');
                const previewBtn = document.getElementById('previewBtn');
                const processBtn = document.getElementById('processBtn');
                const modeSelector = document.getElementById('modeSelector');

                imageList.innerHTML = '';
                this.images.forEach((img, idx) => {
                    const item = document.createElement('div');
                    item.className = 'image-item';
                    item.innerHTML = `
                        <img src="${img.data}" alt="${img.name}">
                        <div class="image-item-name">${img.name}</div>
                        <button class="image-item-remove" onclick="app.removeImage(${idx})">×</button>
                    `;
                    imageList.appendChild(item);
                });

                const hasImages = this.images.length > 0;
                clearBtn.style.display = hasImages ? 'block' : 'none';
                previewBtn.style.display = hasImages ? 'block' : 'none';
                processBtn.style.display = hasImages ? 'block' : 'none';
                modeSelector.style.display = this.images.length > 1 ? 'block' : 'none';

                this.updatePreview();
            },

            removeImage(idx) {
                this.images.splice(idx, 1);
                this.updateUI();
            },

            clearImages() {
                this.images = [];
                document.getElementById('fileInput').value = '';
                this.updateUI();
            },

            getSettings() {
                const useCurrentTime = document.getElementById('useCurrentTime').checked;
                const customTime = document.getElementById('customTime').value;
                const format = document.querySelector('input[name="format"]:checked').value;
                const position = document.querySelector('input[name="position"]:checked').value;
                const textColor = document.querySelector('input[name="textColor"]:checked').value;

                let dt = new Date();
                if (!useCurrentTime && customTime) {
                    dt = new Date(customTime);
                }

                return { dt, format, position, textColor };
            },

            formatTimestamp(dt, format) {
                if (format === 'A') {
                    const year = dt.getFullYear();
                    const month = dt.getMonth() + 1;
                    const date = dt.getDate();
                    const hours = dt.getHours();
                    const minutes = dt.getMinutes().toString().padStart(2, '0');
                    const seconds = dt.getSeconds().toString().padStart(2, '0');
                    const ampm = hours < 12 ? '上午' : '下午';
                    const hour12 = hours % 12 || 12;
                    return `${year}年${month}月${date}日 ${ampm}${hour12}:${minutes}:${seconds}`;
                } else if (format === 'B') {
                    return dt.toLocaleDateString('zh-TW').replace(/\//g, '/') + ' ' +
                           dt.toLocaleTimeString('zh-TW', { hour12: false });
                }
                return dt.toISOString();
            },

            updatePreview() {
                if (this.images.length === 0) {
                    document.getElementById('previewContainer').classList.remove('show');
                    return;
                }

                const settings = this.getSettings();
                const canvas = document.getElementById('previewCanvas');
                const ctx = canvas.getContext('2d');

                const img = new Image();
                img.onload = () => {
                    let cropHeight = 0;
                    const autoCrop = document.getElementById('autoCropTimestamp').checked;
                    if (autoCrop) {
                        const cropPixels = parseInt(document.getElementById('cropPixels').value) || 0;
                        cropHeight = cropPixels;
                    }

                    const finalWidth = img.width;
                    const finalHeight = img.height - cropHeight;

                    canvas.width = finalWidth;
                    canvas.height = finalHeight;

                    ctx.drawImage(img, 0, cropHeight, finalWidth, finalHeight, 0, 0, finalWidth, finalHeight);

                    const text = this.formatTimestamp(settings.dt, settings.format);
                    const fontSize = Math.max(16, Math.floor(img.width * 0.025));
                    const padding = Math.floor(img.width * 0.015);

                    ctx.font = `bold ${fontSize}px Arial, "Microsoft YaHei"`;

                    const metrics = ctx.measureText(text);
                    const textWidth = metrics.width;
                    const textHeight = fontSize;

                    let x, y;
                    switch (settings.position) {
                        case 'top-right':
                            x = img.width - textWidth - padding;
                            y = padding + textHeight;
                            break;
                        case 'top-left':
                            x = padding;
                            y = padding + textHeight;
                            break;
                        case 'bottom-right':
                            x = img.width - textWidth - padding;
                            y = img.height - padding;
                            break;
                        case 'bottom-left':
                            x = padding;
                            y = img.height - padding;
                            break;
                    }

                    ctx.fillStyle = 'black';
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            if (dx !== 0 || dy !== 0) {
                                ctx.fillText(text, x + dx, y + dy);
                            }
                        }
                    }

                    const colors = {
                        white: 'white',
                        black: 'black',
                        yellow: 'yellow'
                    };
                    ctx.fillStyle = colors[settings.textColor];
                    ctx.fillText(text, x, y);

                    document.getElementById('previewContainer').classList.add('show');
                };
                img.src = this.images[0].data;
            },

            async processImages() {
                const settings = this.getSettings();
                const processBtn = document.getElementById('processBtn');
                const status = document.getElementById('status');

                processBtn.disabled = true;
                status.innerHTML = '<span class="processing-spinner"></span>處理中...';
                status.className = 'status show info';

                try {
                    if (this.images.length === 1) {
                        const processed = await this.processImage(this.images[0], settings);
                        const link = document.createElement('a');
                        link.href = processed;
                        link.download = this.generateOutputFilename(this.images[0].name, settings.dt);
                        link.click();

                        status.innerHTML = '✓ 下載完成！';
                        status.className = 'status show success';
                    } else {
                        const zip = new JSZip();

                        for (const img of this.images) {
                            const processed = await this.processImage(img, settings);
                            const filename = this.generateOutputFilename(img.name, settings.dt);
                            const blob = await fetch(processed).then(r => r.blob());
                            zip.file(filename, blob);
                        }

                        const content = await zip.generateAsync({ type: 'blob' });
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(content);
                        link.download = `照片時間戳_${this.formatTimestamp(settings.dt, 'B').replace(/[/:]/g, '')}.zip`;
                        link.click();

                        status.innerHTML = `✓ 已下載 ${this.images.length} 張照片！`;
                        status.className = 'status show success';
                    }
                } catch (error) {
                    status.innerHTML = `✗ 處理失敗：${error.message}`;
                    status.className = 'status show error';
                } finally {
                    processBtn.disabled = false;
                }
            },

            async processImage(imgData, settings) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                return new Promise((resolve, reject) => {
                    img.onload = () => {
                        let cropHeight = 0;

                        const autoCrop = document.getElementById('autoCropTimestamp').checked;
                        if (autoCrop) {
                            const cropPixels = parseInt(document.getElementById('cropPixels').value) || 0;
                            cropHeight = cropPixels;
                        }

                        const finalWidth = img.width;
                        const finalHeight = img.height - cropHeight;

                        canvas.width = finalWidth;
                        canvas.height = finalHeight;

                        ctx.drawImage(img, 0, cropHeight, finalWidth, finalHeight, 0, 0, finalWidth, finalHeight);

                        const text = this.formatTimestamp(settings.dt, settings.format);
                        const fontSize = Math.max(16, Math.floor(img.width * 0.025));
                        const padding = Math.floor(img.width * 0.015);

                        ctx.font = `bold ${fontSize}px Arial, "Microsoft YaHei"`;

                        const metrics = ctx.measureText(text);
                        const textWidth = metrics.width;
                        const textHeight = fontSize;

                        let x, y;
                        switch (settings.position) {
                            case 'top-right':
                                x = img.width - textWidth - padding;
                                y = padding + textHeight;
                                break;
                            case 'top-left':
                                x = padding;
                                y = padding + textHeight;
                                break;
                            case 'bottom-right':
                                x = img.width - textWidth - padding;
                                y = img.height - padding;
                                break;
                            case 'bottom-left':
                                x = padding;
                                y = img.height - padding;
                                break;
                        }

                        ctx.fillStyle = 'black';
                        for (let dx = -1; dx <= 1; dx++) {
                            for (let dy = -1; dy <= 1; dy++) {
                                if (dx !== 0 || dy !== 0) {
                                    ctx.fillText(text, x + dx, y + dy);
                                }
                            }
                        }

                        const colors = {
                            white: 'white',
                            black: 'black',
                            yellow: 'yellow'
                        };
                        ctx.fillStyle = colors[settings.textColor];
                        ctx.fillText(text, x, y);

                        resolve(canvas.toDataURL('image/jpeg', 0.95));
                    };

                    img.onerror = () => reject(new Error('圖片載入失敗'));
                    img.src = imgData.data;
                });
            },

            generateOutputFilename(originalName, dt) {
                const base = originalName.replace(/\.[^/.]+$/, '');
                const ext = originalName.slice(originalName.lastIndexOf('.'));
                const timestamp = dt.toISOString().slice(0, 19).replace(/[-:]/g, '').replace('T', '_');
                return `${base}_${timestamp}${ext}`;
            },
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
